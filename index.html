<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Magazin Qarzı</title>

<link rel="manifest" href="manifest.json">
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function() {
      navigator.serviceWorker.register('sw.js');
    });
  }
</script>
<style>
  :root {
    --navy: #0a1628;
    --navy2: #152340;
    --blue: #1a3a6e;
    --accent: #2d7dd2;
    --gold: #f5a623;
    --red: #e05252;
    --green: #3dbf7a;
    --bg: #f2f6fc;
    --card: #ffffff;
    --text: #1c2b3a;
    --muted: #7a8fa6;
    --border: #dce8f5;
    --shadow: 0 2px 12px rgba(10,22,40,0.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
  .hdr {
    background: linear-gradient(135deg, var(--navy) 0%, var(--blue) 100%);
    color: #fff; padding: 0 16px;
    display: flex; align-items: center; height: 58px;
    position: sticky; top: 0; z-index: 200;
    box-shadow: 0 2px 10px rgba(10,22,40,0.25);
  }
  .hdr-back { background: none; border: none; color: #fff; font-size: 22px; margin-right: 12px; cursor: pointer; padding: 6px; display: none; line-height: 1; }
  .hdr-title { font-size: 18px; font-weight: 700; flex: 1; letter-spacing: 0.3px; }
  .hdr-sub { font-size: 12px; opacity: 0.65; margin-top: 2px; }
  .hdr-right { display: flex; gap: 8px; align-items: center; }
  .hdr-btn { background: rgba(255,255,255,0.15); border: none; color: #fff; border-radius: 8px; padding: 7px 13px; font-size: 13px; cursor: pointer; font-weight: 600; }
  .hdr-btn:active { background: rgba(255,255,255,0.25); }
  .view { display: none; padding: 14px 14px 90px; animation: fadeIn 0.18s ease; }
  .view.active { display: block; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }
  .search-wrap { position: relative; margin-bottom: 14px; }
  .search-wrap input { width: 100%; padding: 12px 14px 12px 40px; border: 2px solid var(--border); border-radius: 12px; font-size: 15px; background: var(--card); color: var(--text); outline: none; transition: border 0.2s; }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 17px; opacity: 0.45; pointer-events: none; }
  .stat-row { display: flex; gap: 10px; margin-bottom: 14px; }
  .stat-card { flex: 1; background: var(--card); border-radius: 12px; padding: 14px 12px; box-shadow: var(--shadow); text-align: center; border-top: 3px solid var(--accent); }
  .stat-card.red { border-top-color: var(--red); }
  .stat-card.green { border-top-color: var(--green); }
  .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 4px; }
  .stat-val { font-size: 16px; font-weight: 800; color: var(--text); }
  .stat-val.red { color: var(--red); }
  .stat-val.green { color: var(--green); }
  .client-item {
    background: var(--card); border-radius: 12px; padding: 14px 16px;
    margin-bottom: 10px; box-shadow: var(--shadow);
    display: flex; align-items: center; gap: 13px;
    cursor: pointer; border-left: 4px solid var(--accent);
    transition: box-shadow 0.15s, transform 0.1s;
  }
  .client-item:active { transform: scale(0.985); box-shadow: none; }
  .client-item.debt-item { border-left-color: var(--red); }
  .client-item.clean-item { border-left-color: var(--green); }
  .avatar {
    width: 44px; height: 44px; border-radius: 22px; flex-shrink: 0;
    background: linear-gradient(135deg, var(--accent), var(--navy));
    color: #fff; font-size: 18px; font-weight: 800;
    display: flex; align-items: center; justify-content: center;
  }
  .client-info { flex: 1; min-width: 0; }
  .client-name { font-size: 16px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .client-meta { font-size: 12px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .client-debt { font-size: 15px; font-weight: 800; flex-shrink: 0; }
  .debt-pos { color: var(--red); }
  .debt-zero { color: var(--green); }
  .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-icon { font-size: 52px; margin-bottom: 12px; }
  .empty p { font-size: 15px; line-height: 1.6; }
  .fab {
    position: fixed; bottom: 24px; right: 20px;
    width: 58px; height: 58px; border-radius: 29px;
    background: linear-gradient(135deg, var(--accent), var(--navy));
    color: #fff; border: none; font-size: 28px;
    box-shadow: 0 4px 18px rgba(45,125,210,0.45);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    z-index: 150; transition: transform 0.15s;
  }
  .fab:active { transform: scale(0.92); }
  .form-section { background: var(--card); border-radius: 14px; padding: 18px 16px; box-shadow: var(--shadow); margin-bottom: 14px; }
  .form-label { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; display: block; }
  .form-input {
    width: 100%; padding: 12px 14px; border: 2px solid var(--border);
    border-radius: 10px; font-size: 15px; color: var(--text);
    background: var(--bg); outline: none; transition: border 0.2s;
    margin-bottom: 14px; display: block;
  }
  .form-input:focus { border-color: var(--accent); background: #fff; }
  .form-input:last-of-type { margin-bottom: 0; }
  .btn-primary {
    width: 100%; padding: 14px; border: none; border-radius: 12px;
    background: linear-gradient(135deg, var(--accent), var(--navy));
    color: #fff; font-size: 16px; font-weight: 700; cursor: pointer;
    box-shadow: 0 3px 12px rgba(45,125,210,0.3); transition: opacity 0.15s;
  }
  .btn-primary:active { opacity: 0.82; }
  .debt-banner {
    background: linear-gradient(135deg, var(--navy) 0%, var(--blue) 100%);
    border-radius: 14px; padding: 20px 18px; margin-bottom: 14px;
    color: #fff; display: flex; align-items: center; gap: 14px;
    box-shadow: 0 4px 18px rgba(10,22,40,0.2);
  }
  .debt-avatar { width: 52px; height: 52px; border-radius: 26px; background: rgba(255,255,255,0.15); font-size: 22px; font-weight: 900; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .debt-info { flex: 1; min-width: 0; }
  .debt-name { font-size: 18px; font-weight: 800; }
  .debt-phone { font-size: 13px; opacity: 0.7; margin-top: 2px; }
  .debt-amount-wrap { text-align: right; flex-shrink: 0; }
  .debt-lbl { font-size: 11px; opacity: 0.65; text-transform: uppercase; letter-spacing: 0.4px; }
  .debt-total { font-size: 24px; font-weight: 900; margin-top: 2px; }
  .trx-list-title { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .trx-scroll { max-height: 260px; overflow-y: auto; margin-bottom: 14px; }
  .trx-scroll::-webkit-scrollbar { width: 4px; }
  .trx-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .trx-item {
    background: var(--card); border-radius: 10px; padding: 12px 14px;
    margin-bottom: 8px; display: flex; align-items: center; gap: 12px;
    box-shadow: 0 1px 4px rgba(10,22,40,0.06);
  }
  .trx-dot { width: 36px; height: 36px; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .trx-dot.plus { background: #ffe9e9; }
  .trx-dot.minus { background: #e6f9ef; }
  .trx-body { flex: 1; }
  .trx-type { font-size: 14px; font-weight: 700; color: var(--text); }
  .trx-date { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .trx-amt { font-size: 15px; font-weight: 800; flex-shrink: 0; }
  .trx-amt.plus { color: var(--red); }
  .trx-amt.minus { color: var(--green); }
  .action-panel { background: var(--card); border-radius: 14px; padding: 16px; box-shadow: var(--shadow); }
  .action-tabs { display: flex; background: var(--bg); border-radius: 10px; padding: 3px; margin-bottom: 14px; }
  .action-tab { flex: 1; padding: 10px; border: none; border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; background: none; color: var(--muted); transition: all 0.2s; }
  .action-tab.active.add { background: var(--red); color: #fff; }
  .action-tab.active.pay { background: var(--green); color: #fff; }
  .sum-input { width: 100%; padding: 13px 14px; border: 2px solid var(--border); border-radius: 10px; font-size: 18px; font-weight: 700; color: var(--text); background: var(--bg); outline: none; text-align: center; margin-bottom: 12px; transition: border 0.2s; display: block; }
  .sum-input:focus { border-color: var(--accent); background: #fff; }
  .quick-btns { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
  .quick-btn { flex: 1; min-width: 60px; padding: 9px 6px; border: 2px solid var(--border); border-radius: 8px; background: var(--bg); font-size: 13px; font-weight: 700; color: var(--text); cursor: pointer; text-align: center; transition: all 0.15s; }
  .quick-btn:active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .confirm-btn { width: 100%; padding: 14px; border: none; border-radius: 12px; font-size: 16px; font-weight: 800; color: #fff; cursor: pointer; transition: opacity 0.15s; }
  .confirm-btn.add { background: linear-gradient(135deg, var(--red), #c0392b); box-shadow: 0 3px 12px rgba(224,82,82,0.35); }
  .confirm-btn.pay { background: linear-gradient(135deg, var(--green), #27ae60); box-shadow: 0 3px 12px rgba(61,191,122,0.35); }
  .confirm-btn:active { opacity: 0.82; }
  .delete-btn { background: none; border: 2px solid var(--red); color: var(--red); border-radius: 10px; padding: 10px; font-size: 14px; font-weight: 700; width: 100%; cursor: pointer; margin-top: 12px; transition: all 0.15s; }
  .delete-btn:active { background: var(--red); color: #fff; }
  .toast {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--navy); color: #fff; padding: 11px 22px; border-radius: 20px;
    font-size: 14px; font-weight: 600; z-index: 500; opacity: 0;
    transition: all 0.3s; pointer-events: none; white-space: nowrap; box-shadow: 0 4px 18px rgba(10,22,40,0.3);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .modal-overlay { position: fixed; inset: 0; background: rgba(10,22,40,0.55); z-index: 300; display: none; align-items: flex-end; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal-box { background: var(--card); border-radius: 20px 20px 0 0; padding: 24px 20px 36px; width: 100%; max-width: 480px; }
  .modal-title { font-size: 18px; font-weight: 800; margin-bottom: 10px; color: var(--text); }
  .modal-msg { font-size: 15px; color: var(--muted); margin-bottom: 20px; line-height: 1.5; }
  .modal-btns { display: flex; gap: 10px; }
  .modal-btns button { flex: 1; padding: 13px; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; }
  .modal-cancel { background: var(--bg); color: var(--text); }
  .modal-confirm { background: var(--red); color: #fff; }
</style>
</head>
<body>

<div class="hdr" id="header">
  <button class="hdr-back" id="backBtn" onclick="goBack()">&#8592;</button>
  <div style="flex:1;min-width:0">
    <div class="hdr-title" id="hdrTitle">Magazin Qarzı 🏪</div>
    <div class="hdr-sub" id="hdrSub"></div>
  </div>
  <div class="hdr-right" id="hdrRight">
    <button class="hdr-btn" onclick="exportData()">📤 Eksport</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="deleteModal">
  <div class="modal-box">
    <div class="modal-title">Adamdı óshiriw</div>
    <div class="modal-msg" id="deleteModalMsg"></div>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal()">Joq, artqa</button>
      <button class="modal-confirm" onclick="confirmDelete()">Awa, óshir</button>
    </div>
  </div>
</div>

<div id="mainView" class="view active">
  <div class="stat-row" id="statRow"></div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Atı yamasa nomeri menen izlew..." oninput="renderClients()">
  </div>
  <div id="clientList"></div>
  <button class="fab" onclick="showView('addClientView')">＋</button>
</div>

<div id="addClientView" class="view">
  <div class="form-section">
    <label class="form-label">Adam atı *</label>
    <input class="form-input" type="text" id="newName" placeholder="Mysal: Azizbek">
    <label class="form-label">Telefon nomeri</label>
    <input class="form-input" type="tel" id="newPhone" placeholder="+998 90 123 45 67">
    <label class="form-label">Manzili</label>
    <input class="form-input" type="text" id="newAddress" placeholder="Rayon, kóshesi, jay nomeri">
    <label class="form-label">Baslang'ısh qarz (sum)</label>
    <input class="form-input" type="number" id="newInitDebt" placeholder="0 — egerde qarzı bar bolsa" inputmode="numeric">
  </div>
  <button class="btn-primary" onclick="saveClient()">✓ Adamdı qosiw</button>
</div>

<div id="detailView" class="view">
  <div class="debt-banner" id="debtBanner"></div>
  <div class="trx-list-title">Tarix</div>
  <div class="trx-scroll" id="trxList"></div>
  <div class="action-panel">
    <div class="action-tabs">
      <button class="action-tab active add" id="tabAdd" onclick="setTab('add')">➕ Qarz qosıw</button>
      <button class="action-tab pay" id="tabPay" onclick="setTab('pay')">✅ Qarz óshiriw</button>
    </div>
    <input class="sum-input" type="number" id="debtInput" placeholder="Summa kiritiń..." inputmode="numeric">
    <div class="quick-btns">
      <button class="quick-btn" onclick="addQuick(10000)">10K</button>
      <button class="quick-btn" onclick="addQuick(20000)">20K</button>
      <button class="quick-btn" onclick="addQuick(50000)">50K</button>
      <button class="quick-btn" onclick="addQuick(100000)">100K</button>
      <button class="quick-btn" onclick="addQuick(200000)">200K</button>
    </div>
    <button class="confirm-btn add" id="confirmBtn" onclick="doTransaction()">➕ Qarz qosıw</button>
  </div>
  <button class="delete-btn" onclick="askDelete()">🗑 Adamdı óshiriw</button>
</div>

<script>
var DB = loadDB();
function loadDB() {
  try { return JSON.parse(localStorage.getItem('mq_v2') || 'null') || { clients: [], trx: [] }; }
  catch(e) { return { clients: [], trx: [] }; }
}
function saveDB() { localStorage.setItem('mq_v2', JSON.stringify(DB)); }

var curClientId = null;
var curTab = 'add';
var deleteTarget = null;

function showView(id) {
  document.querySelectorAll('.view').forEach(function(v){ v.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
  var backBtn = document.getElementById('backBtn');
  var hdrRight = document.getElementById('hdrRight');
  var hdrSub = document.getElementById('hdrSub');
  var hdrTitle = document.getElementById('hdrTitle');
  if (id === 'mainView') {
    backBtn.style.display = 'none';
    hdrTitle.innerText = 'Magazin Qarzı 🏪';
    hdrSub.innerText = '';
    hdrRight.innerHTML = '<button class="hdr-btn" onclick="exportData()">📤 Eksport</button>';
    renderStats(); renderClients();
  } else if (id === 'addClientView') {
    backBtn.style.display = 'block';
    hdrTitle.innerText = 'Adam qosiw';
    hdrSub.innerText = '';
    hdrRight.innerHTML = '';
    ['newName','newPhone','newAddress','newInitDebt'].forEach(function(f){ document.getElementById(f).value = ''; });
  } else if (id === 'detailView') {
    backBtn.style.display = 'block';
    var c = getClient(curClientId);
    hdrTitle.innerText = c.name;
    hdrSub.innerText = c.phone || '';
    hdrRight.innerHTML = '';
    setTab('add');
    renderBanner(); renderTrx();
    document.getElementById('debtInput').value = '';
  }
}

function goBack() { showView('mainView'); }
function getClient(id) { return DB.clients.find(function(c){ return c.id === id; }); }

function fmt(n) {
  return Number(n).toLocaleString('ru-RU') + ' sum';
}
function initial(name) { return (name||'?').trim()[0].toUpperCase(); }
function dateStr(ts) {
  var d = new Date(ts);
  return d.getDate().toString().padStart(2,'0') + '.' + (d.getMonth()+1).toString().padStart(2,'0') + '.' + d.getFullYear() + ' ' + d.getHours() + ':' + d.getMinutes().toString().padStart(2,'0');
}

function toast(msg, dur) {
  if (!dur) dur = 2300;
  var t = document.getElementById('toast');
  t.innerText = msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, dur);
}

function renderStats() {
  var total = DB.clients.reduce(function(s,c){ return s + c.totalDebt; }, 0);
  var clean = DB.clients.filter(function(c){ return c.totalDebt <= 0; }).length;
  document.getElementById('statRow').innerHTML =
    '<div class="stat-card"><div class="stat-label">Adamlar</div><div class="stat-val">' + DB.clients.length + '</div></div>' +
    '<div class="stat-card red"><div class="stat-label">Jámı qarz</div><div class="stat-val red">' + fmt(total) + '</div></div>' +
    '<div class="stat-card green"><div class="stat-label">Taza</div><div class="stat-val green">' + clean + '</div></div>';
}

function renderClients() {
  var q = (document.getElementById('searchInput').value || '').toLowerCase();
  var list = DB.clients.slice().sort(function(a,b){ return b.lastAccessed - a.lastAccessed; });
  if (q) list = list.filter(function(c){ return c.name.toLowerCase().includes(q) || (c.phone||'').includes(q); });
  var el = document.getElementById('clientList');
  if (!list.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">👤</div><p>' + (q ? 'Bunday adam tabılmadı' : 'Házirshe adam qosilmagan.<br>+ túymesin basıń!') + '</p></div>';
    return;
  }
  el.innerHTML = list.map(function(c) {
    var cls = c.totalDebt > 0 ? 'debt-item' : 'clean-item';
    var amtCls = c.totalDebt > 0 ? 'debt-pos' : 'debt-zero';
    return '<div class="client-item ' + cls + '" onclick="openDetail(' + c.id + ')">' +
      '<div class="avatar">' + initial(c.name) + '</div>' +
      '<div class="client-info">' +
        '<div class="client-name">' + c.name + '</div>' +
        '<div class="client-meta">' + (c.phone||'') + (c.phone && c.address ? ' · ' : '') + (c.address||'') + '</div>' +
      '</div>' +
      '<div class="client-debt ' + amtCls + '">' + fmt(c.totalDebt) + '</div>' +
    '</div>';
  }).join('');
  renderStats();
}

function saveClient() {
  var name = document.getElementById('newName').value.trim();
  if (!name) { toast('❗ Atın kiritiw shárt!'); return; }
  var initDebt = parseInt(document.getElementById('newInitDebt').value) || 0;
  var id = Date.now();
  var now = Date.now();
  DB.clients.push({ id: id, name: name, phone: document.getElementById('newPhone').value.trim(), address: document.getElementById('newAddress').value.trim(), totalDebt: initDebt, lastAccessed: now });
  if (initDebt > 0) DB.trx.push({ id: now+1, clientId: id, amount: initDebt, type: 'qosildi', date: now, note: "Baslang'ısh qarz" });
  saveDB();
  toast('✅ ' + name + ' qosildi!');
  showView('mainView');
}

function openDetail(id) {
  curClientId = id;
  var c = getClient(id);
  c.lastAccessed = Date.now();
  saveDB();
  showView('detailView');
}

function renderBanner() {
  var c = getClient(curClientId);
  var amtColor = c.totalDebt > 0 ? '#ff8585' : '#6ee89a';
  document.getElementById('debtBanner').innerHTML =
    '<div class="debt-avatar">' + initial(c.name) + '</div>' +
    '<div class="debt-info">' +
      '<div class="debt-name">' + c.name + '</div>' +
      '<div class="debt-phone">' + (c.phone||'Nomer joq') + (c.address ? ' · ' + c.address : '') + '</div>' +
    '</div>' +
    '<div class="debt-amount-wrap">' +
      '<div class="debt-lbl">Jámı qarz</div>' +
      '<div class="debt-total" style="color:' + amtColor + '">' + fmt(c.totalDebt) + '</div>' +
    '</div>';
}

function renderTrx() {
  var trxs = DB.trx.filter
